# 3d_memory :: optimization configs for the phase-1 BW-max MINLP.
#
# `defaults` holds every parameter the model (opt/model.py) needs. Each entry
# under `configs` is deep-merged onto `defaults` (per sub-block), so a config
# only needs to list what it changes. Select one with
#   python opt/run_bw_max.py --config <name>
# or run them all with --all.  List names with --list.
#
# Units: time [ns], length [um], area [um^2], volume [um^3], capacity [bit].
# Sense model (technology.*): cap [fF/cell], resistance [ohm/cell or ohm],
# current [uA], voltage [V] -- see opt/model.py::develop_coeffs.

defaults:

  # ---- problem inputs (given) ----
  problem:
    C:       800.0e9      # target capacity                 [bit]  (~800 Gbit)
    A:       800.0e6    # footprint (area per layer)      [um^2]
    L:       8          # layer budget                    [layers]
    t_layer: 1.0        # physical thickness per layer    [um]
    # Cooling power-density budget. 1 W/mm^2 == 1 uW/um^2 (the model's unit),
    # so P_max is numerically identical in both. Presets: 0.4 air / 1.1 liquid
    # (default) / 2.0 microfluidic (docs/ENERGY_MODEL_SPEC.md).
    P_max:   1.1        # power-density ceiling           [W/mm^2 == uW/um^2]

  # ---- technology / calibration coefficients ----
  # Peripheral volumes calibrated 2026-07-14 from the `memory_model` subarray tool
  # (SRAM_GEN size sweep; reproduce with opt/calibrate_periph.py): each block's per-row/per-column
  # area SLOPE is separated from the fixed intercept, normalized to F^2 (F=Lgate),
  # then to 16 nm volume via v = area_F2*(16e-3 um)^2*t_layer -- the same currency
  # as v_cell. The CMOS periphery (v_wldrv, v_sa0 voltage latch, v_pre, v_periph)
  # is a shared logic process, so it lives in `defaults`; the terms memory_model
  # CANNOT model -- resistive SET/RESET write drivers (v_wdrv), HV BL/SL pass gates
  # (v_pass), and current-sense IV converters (v_sa0) -- stay EMBER/DESTINY-anchored
  # in the per-type overrides below.
  technology:
    k_dec:       0.02     # decoder delay per address bit          [ns]
    # WL develop = distributed WIRE self-RC (quadratic) + CELL/gate load (linear):
    #   t_WL = k_wire_WL*N_BL^2 + k_cell_WL*N_BL   (WL spans N_BL columns)
    # k_wire_WL = 1/2*r*c set by the BEOL metal stack + node (shared across cell
    # techs on one wire stack); k_cell_WL = per-cell gate load (per-technology).
    k_wire_WL:   1.1e-7   # WL wire self-RC     (per column^2)      [ns]  shared
    k_cell_WL:   4.0e-5   # WL cell/gate load   (per column)        [ns]  per-tech
    # BL develop is now the sense-signal SETTLING model (Upton 2024 App. A/B),
    # derived in opt/model.py::develop_coeffs from the physical params below:
    #   t_BL = f_margin(Delta,mode) * (a_lin*N_WL + a_quad*N_WL^2)
    # a_quad = 1/2*r_bl*c_bl (shared BL wire self-RC); a_lin per sense mode.
    t_SA0:       0.2      # intrinsic device read/latch floor       [ns]  per-tech
    t_restore:   0.8      # restore time (destructive read)         [ns]
    destructive: 0        # 1 => fold restore into t_SA (DRAM-like)
    t_sw:        0.03     # selector switching time                 [ns]
    # Per-component peripheral volumes (model.py::TechSpec / build_model). Each
    # circuit block scales by its own physical law; a block a technology lacks is
    # zeroed (e.g. charge-share DRAM: v_wdrv=0, write-back via the sense amp).
    # SHARED endpoints (per sensed/written bit, scale with N_SA):
    v_cell:      0.02     # volume per stored bit                   [um^3/bit]
    v_sa0:       0.26     # voltage-latch sense amp, per sensed bit [um^3/bit] (memory_model SRAM fit; current-sense +IV converter overrides below)
    v_wdrv:      0.05     # CMOS bitline write driver, per access bit [um^3/bit] (resistive SET/RESET drivers override large)
    # PER-ARRAY in-array strips (scale with columns/rows over every array):
    v_pass:      0.0      # HV BL/SL pass-gate, per column          [um^3/col] (0 for CMOS-accessed cells; resistive 1T1R overrides)
    v_pre:       0.017    # precharger, per column                  [um^3/col] (memory_model SRAM fit)
    v_wldrv:     2.65     # WL driver + row decoder, per row        [um^3/row] (memory_model SRAM fit; DOMINANT CMOS periphery)
    v_sel:       0.2      # inter-array sharing selector, per (EXTRA shared array x SA) [um^3] (0 at N_share=1)
    v_periph:    90.0     # fixed decode/control overhead per array [um^3/array] (memory_model fixed intercept)
    # ---- sense-settling model (Upton 2024 App. A/B; DRAM charge-share) ----
    sense_mode:  voltage  # 'current' (App. A) | 'voltage' (App. B) | 'charge_share' (1T1C DRAM)
    settle_frac: 0.99     # Delta: fraction of steady state to settle to
    c_bl:        0.2      # BL parasitic cap per cell               [fF/cell]  shared
    r_bl:        12.0     # BL wire resistance per cell pitch       [ohm/cell] shared
    i_read:      5.0      # read current            (current mode)  [uA]  per-tech
    n_ut:        0.04     # subthreshold n*Ut       (current mode)  [V]
    r_pullup:    40000.0  # pull-up resistance      (voltage mode)  [ohm] per-tech
    v_ratio:     0.4      # V_BL,CELL/V_READ divider(voltage mode)  [-]
    c_cell:      25.0     # storage cap per cell    (charge-share)  [fF]  per-tech
    margin_sa:   0.1      # min charge-share signal C_cell/(C_cell+C_BL) (charge-share) [-]
    # ---- energy / power-density model (opt/model.py::energy_coeffs) ----
    # Read energy = (c_cell + c_bl*N_WL)*V_read^2*N_BL + e_periph, amortized over
    # b_acc bits. V_read is the CV^2 swing (full rail for latch/resistive reads
    # and destructive-restore charge reads; partial v_read*v_sense only for a
    # non-destructive charge read). Write energy adds e_write_cell per written
    # bit (NVM Joule set/reset); leakage is p_leak_bit per stored bit (DRAM
    # refresh, SRAM gate leak).
    v_read:         1.0     # read/precharge supply swing            [V]  per-tech
    v_sense:        0.1     # developed charge-share signal          [V]  (charge-share only)
    e_periph:       50.0    # fixed decode/WL-drive energy/access    [fJ/access]
    e_write_cell:   0.0     # per-cell write energy beyond CV^2      [fJ/bit]  per-tech (NVM)
    p_leak_bit:     1.0e-6  # leakage/refresh power per stored bit   [uW/bit]  per-tech
    write_fraction: 0.0     # fraction of accesses that are writes   [-]  (0 = read-BW study)

  # ---- variable bounds ----
  bounds:
    NBL_min:    1
    NBL_max:    1000000
    NWL_min:    1
    NWL_max:    1000000
    Nshare_min: 1
    Nshare_max: 100
    Nindep_max: 2.0e5

  # ---- optional: pin decision variables to a fixed value ----
  # Any of N_BL / N_WL / N_share listed here is fixed by collapsing its
  # [min,max] bounds onto the given value (leave empty to optimize freely).
  fix: {}

  # ---- solver knobs ----
  solver:
    nonconvex: 2
    timelim:   300
    outlev:    1

configs:

  gaincell_100Mb:
    description: Non-destructive gain-cell macro; read-FET voltage sense (baseline).
    # inherits all defaults

  dram_100Mb:
    description: Destructive 1T1C DRAM-like cell; passive charge-share read
                 (series-cap saturates -> ~linear develop, signal-collapse caps
                 rows), restore folded into t_SA (write-back), so the t_SA floor
                 is high and sharing buys little.
    technology:
      sense_mode: charge_share
      destructive: 1
      t_SA0:     0.25
      t_restore: 1.2
      c_cell:    25.0     # ~25 fF storage cap (JEDEC DRAM design target)
      v_cell:    0.012    # denser bitcell
      v_wdrv:    0.0      # destructive charge-share writes back through the sense amp -- no dedicated write driver

  nvm_100Mb:
    description: Non-destructive resistive NVM; current sensing, slower read.
    technology:
      sense_mode: current
      t_SA0:  0.6
      i_read: 3.0         # weaker read current -> slower settle
      v_sa0:  13.0        # current sense + DESTINY IV converter
      v_wdrv: 30.0        # resistive SET/RESET needs wide HV write drivers
      v_pass: 0.5         # HV BL/SL pass gates, edge-stacked (pitch > cell)
      v_cell: 0.03

  gaincell_tight_settle:
    description: Baseline gain cell but settling to 99.9% (tighter read margin);
                 shows the develop-time cost of a stricter settling fraction.
    technology:
      settle_frac: 0.999

  gaincell_big_footprint:
    description: Baseline gain cell on a 2x larger footprint (more volume for
                 peripheral bandwidth at the same capacity).
    problem:
      A: 1.6e9

  # =====================================================================
  # Literature-calibrated technology points (added 2026-07-13; migrated to
  # the sense-settling model 2026-07-14).
  #
  # Cell areas are feature-normalized cell sizes (F^2) from cited sources
  # scaled to a COMMON 16 nm node:
  #     v_cell [um^3/bit] = cellArea_F2 * (16e-3 um)^2 * t_layer(=1 um)
  #                       = cellArea_F2 * 2.56e-4
  # t_SA0 is the intrinsic device read/latch floor (representative validated-
  # silicon read times at the cited nodes -- order-of-magnitude, not exact-at-
  # 16nm). destructive=1 only for charge reads that write back (DRAM/eDRAM).
  # sense_mode: voltage for latch (SRAM) / transistor (FeFET, gain-cell) reads;
  # charge_share for passive 1T1C DRAM/eDRAM (series-cap saturation + signal
  # collapse); current for resistive reads (STT/SOT/RRAM/PCM), which also carry
  # an IV converter, so
  # v_sa0 is bumped (DESTINY constant.h:50 IV_CONVERTER_AREA=50000 F^2 ~12.8 um^2).
  #
  # Sources:
  #   NVMExplorer  = Pentecost et al., HPCA 2022, Table I (F^2, read/write ns)
  #   NVSim        = Dong et al., TCAD 2012, validation Tables IV/V/VII/VIII
  #   DESTINY      = Mittal et al., JLPEA 2017 (cells in config/*.cell; SA model)
  #   EMBER        = Upton et al., ESSCIRC 2023 (RRAM 1T1R read)
  #   Upton 2024   = sensing settling-time appendices (current App. A, voltage App. B)
  # =====================================================================

  sram_16nm:
    description: 6T SRAM, non-destructive fast latch sense (voltage). Area-hungry
                 (146 F^2) so 100 Mb needs a tall stack.
    technology:
      sense_mode: voltage
      t_SA0:  0.5       # NVMExplorer read 0.5-1.5 ns (7-16 nm)
      v_cell: 0.0374    # 146 F^2 (NVMExplorer / DESTINY sample_SRAM.cell) @ 16 nm
      # v_sa0 inherits the memory_model voltage-latch default (0.26)

  edram_16nm:
    description: 1T1C embedded DRAM; destructive passive charge-share read ->
                 write-back restore folded into the cycle. Denser (smaller)
                 storage cap than commodity DRAM, so signal collapses at fewer
                 rows.
    problem:
      L: 4              # 60 F^2 cell fills ~3 layers
    technology:
      sense_mode: charge_share
      destructive: 1
      t_SA0:     1.5    # charge-share sense; NVSim DRAM tRCD ~15 ns (90 nm), scaled
      t_restore: 6.0    # tRAS-tRCD write-back
      v_cell:    0.0154 # 60 F^2 (DESTINY sample_2D_eDRAM.cell) @ 16 nm
      # v_sa0 inherits the memory_model voltage-latch default (0.26)
      v_wdrv:    0.0    # destructive charge-share writes back through the sense amp
      c_cell:    10.0   # ~10 fF eDRAM storage cap (denser 1T1C, < commodity DRAM)

  sttmram_16nm:
    description: STT-MRAM 1T1R; non-destructive resistive read, current sensing.
    technology:
      sense_mode: current
      t_SA0:  5.0       # NVMExplorer read 1.3-19 ns; DESTINY-validated 4.83 ns (45 nm)
      i_read: 4.0       # TMR read current
      v_cell: 0.00512   # 20 F^2 (NVMExplorer 14-75 F^2, low end) @ 16 nm
      v_sa0:  13.0      # 0.26 latch + DESTINY IV converter (50000 F^2 = 12.8 um^3)
      v_wdrv: 20.0      # STT switching-current write driver
      v_pass: 0.3       # HV BL/SL pass gates

  sotmram_16nm:
    description: SOT-MRAM 3-terminal; decoupled fast read (current sense),
                 non-destructive.
    technology:
      sense_mode: current
      t_SA0:  4.0       # NVMExplorer read 1.4-11 ns; DESTINY-validated 3.8 ns (SLC)
      i_read: 5.0
      v_cell: 0.00512   # 20 F^2 (NVMExplorer single point) @ 16 nm
      v_sa0:  13.0      # 0.26 latch + DESTINY IV converter (50000 F^2 = 12.8 um^3)
      v_wdrv: 20.0      # SOT write-current driver
      v_pass: 0.3       # HV BL/SL pass gates

  reram_16nm:
    description: ReRAM 1T1R; non-destructive resistive read, current sensing.
    technology:
      sense_mode: current
      t_SA0:  0.3       # latch floor; read time is settling-dominated (EMBER ~5 ns)
      i_read: 3.0       # 1T1R access-limited read current
      t_sw:   0.05      # 1T1R access + bleed-path selector
      v_cell: 0.00307   # 12 F^2 (NVMExplorer 4-53 F^2, 1T1R access-limited) @ 16 nm
      v_sa0:  13.0      # 0.26 latch + DESTINY IV converter (50000 F^2 = 12.8 um^3)
      v_wdrv: 40.0      # RRAM SET/RESET HV drivers dominate periphery (EMBER: BL/SL drivers+muxes ~33%)
      v_pass: 0.5       # HV BL/SL pass gates, edge-stacked (EMBER Fig. 6)

  reram_xpoint_16nm:
    description: Crosspoint ReRAM (0T1R / 1D1R); ~4 F^2, but IR-drop / sneak-path
                 caps the subarray size, so current-sense settling dominates.
    problem:
      L: 2              # 4 F^2 cell is tiny; cells fill well under one layer
    bounds:
      NBL_max: 512      # IR-drop-limited crosspoint subarray (Lepri 2022)
      NWL_max: 512
    technology:
      sense_mode: current
      t_SA0:  0.3       # latch floor; sneak-path settling carries the read time
      i_read: 2.0       # weak crosspoint read current (sneak paths)
      t_sw:   0.1       # 2-terminal selector nonlinearity (no access transistor)
      v_cell: 0.001024  # 4 F^2 (NVSim cross-point 0T1R/1D1R) @ 16 nm
      v_sa0:  13.0      # 0.26 latch + DESTINY IV converter (50000 F^2 = 12.8 um^3)
      v_wdrv: 15.0      # SET/RESET drivers present, but no per-cell 1T1R access FET (0T1R density win)
      v_wldrv: 0.3      # 0T1R row line is an edge current driver, NOT a CMOS row decoder (no access-FET gate stack) -> << the SRAM-fit default 2.65
      # v_pass stays at the default (0.0): 0T1R has no HV access/pass transistor;
      # column select is the edge mux + the 2-terminal selector (already in t_sw).

  pcram_16nm:
    description: PCM 1T1R; non-destructive read but slow, voltage-mode sense
                 (high cell resistance -> weak divider signal -> slow settle).
    technology:
      sense_mode: voltage
      t_SA0:  2.0       # intrinsic sense floor; NVSim-validated 65.9 ns @ 0.12 um total
      r_pullup: 320000.0 # high pull-up for high-R cell -> slow settle
      v_cell: 0.0064    # 25 F^2 (NVMExplorer 25-40 F^2, low end) @ 16 nm
      v_sa0:  1.0       # voltage sense; high-R cell -> weak signal comparator > SRAM latch
      v_wdrv: 40.0      # PCM melt-current RESET needs wide HV write drivers
      v_pass: 0.5       # HV BL/SL pass gates, edge-stacked

  fefet_16nm:
    description: FeFET; transistor-based non-destructive read (voltage sense).
                 Fast read, very low write energy.
    technology:
      sense_mode: voltage
      t_SA0:  1.0       # FeRAM read ~14 ns; FeFET read faster (transistor sense)
      v_cell: 0.00384   # 15 F^2 (NVMExplorer FeFET 4-103 F^2) @ 16 nm
      # v_sa0 inherits the memory_model voltage-latch default (0.26)
